<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Tcash is a World mini app for manual WLD and USDC exchange with M-Pesa settlement."
    />
    <meta name="theme-color" content="#0b0f1a" />
    <meta property="og:title" content="Tcash | WLD and M-Pesa Exchange" />
    <meta property="og:description" content="Bridge crypto to cash in World App with live WLD and USDC settlement to M-Pesa." />
    <meta property="og:image" content="/tcash-meta.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tcash | WLD and M-Pesa Exchange" />
    <meta name="twitter:description" content="Bridge crypto to cash in World App with live WLD and USDC settlement to M-Pesa." />
    <meta name="twitter:image" content="/tcash-meta.png" />
    <link rel="icon" type="image/png" href="/tcash-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Tcash | WLD and M-Pesa Exchange</title>
    <style>
      body {
        margin: 0;
        background: #0b0f1a;
        color: #f5f7ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          system-ui, "Helvetica Neue", Arial, sans-serif;
      }

      .boot-fallback {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(100%, 440px);
        display: grid;
        gap: 14px;
        padding: 24px;
        border-radius: 24px;
        background: rgba(17, 24, 39, 0.94);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .boot-pill {
        width: fit-content;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(79, 124, 255, 0.16);
        color: #c9d7ff;
      }

      .boot-card h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.1;
      }

      .boot-card p {
        margin: 0;
        color: #97a3bf;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <div class="boot-card">
          <span class="boot-pill">Tcash</span>
          <h1>Loading World App session</h1>
          <p>If this stays here, close Tcash and open it again from World App.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
